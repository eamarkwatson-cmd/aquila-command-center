name: Repair migration history and push new migration

on:
  workflow_dispatch:

jobs:
  repair-and-push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: oxfkrthjpovhgwgxqvog
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $PROJECT_REF

      - name: Mark 5 already-applied migrations as applied (bookkeeping only, no SQL executed)
        run: |
          supabase migration repair --status applied 20260713163516
          supabase migration repair --status applied 20260713200000
          supabase migration repair --status applied 20260714135106
          supabase migration repair --status applied 20260715090000
          supabase migration repair --status applied 20260715120000

      - name: Verify history after repair (no changes made)
        run: supabase migration list --linked

      - name: Push the one real pending migration
        run: supabase db push

      - name: Verify final history (no changes made)
        run: supabase migration list --linked
